name: Backfill historical ads

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Number of days to backfill"
        required: true
        default: "90"
      competitor:
        description: "Single competitor name (optional, blank = all)"
        required: false
        default: ""

concurrency:
  group: competitive-intel
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Pull SQLite state
        env:
          GH_TOKEN: ${{ github.token }}
        run: python -c "from src.storage import pull; pull()"

      - name: Run backfill
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: |
          ARGS="--backfill ${{ github.event.inputs.days }}"
          if [ -n "${{ github.event.inputs.competitor }}" ]; then
            ARGS="$ARGS --competitor '${{ github.event.inputs.competitor }}'"
          fi
          python -m src.main $ARGS

      - name: Push SQLite state
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: python -c "from src.storage import push; push()"
